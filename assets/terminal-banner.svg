<svg width="980" height="340" viewBox="0 0 980 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Selim animated developer banner</title>
  <desc id="desc">Animated terminal style banner for the slmpst GitHub profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.48" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#062f2f"/>
    </linearGradient>
    <linearGradient id="accent" x1="70" y1="50" x2="900" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="0.55" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#1e293b" stroke-width="1" opacity="0.45"/>
    </pattern>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .scan { animation: scan 4.8s linear infinite; }
      .float-a { animation: floatA 5.5s ease-in-out infinite; }
      .float-b { animation: floatB 6.5s ease-in-out infinite; }
      .blink { animation: blink 1s steps(2, start) infinite; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; transform-origin: center; }
      .bar-a { animation: barA 2.8s ease-in-out infinite; }
      .bar-b { animation: barB 3.1s ease-in-out infinite; }
      .bar-c { animation: barC 2.5s ease-in-out infinite; }
      .line-one { animation: lineOne 8s steps(1, end) infinite; }
      .line-two { animation: lineTwo 8s steps(1, end) infinite; }
      .line-three { animation: lineThree 8s steps(1, end) infinite; }
      @keyframes scan {
        0% { transform: translateX(-260px); opacity: 0; }
        12% { opacity: .9; }
        80% { opacity: .9; }
        100% { transform: translateX(1080px); opacity: 0; }
      }
      @keyframes floatA {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
      }
      @keyframes floatB {
        0%,100% { transform: translateY(0) translateX(0); }
        50% { transform: translateY(10px) translateX(-8px); }
      }
      @keyframes blink { 50% { opacity: 0; } }
      @keyframes pulse {
        0%,100% { opacity: .65; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.08); }
      }
      @keyframes barA { 0%,100% { height: 28px; y: 246px; } 50% { height: 62px; y: 212px; } }
      @keyframes barB { 0%,100% { height: 52px; y: 222px; } 50% { height: 30px; y: 244px; } }
      @keyframes barC { 0%,100% { height: 36px; y: 238px; } 50% { height: 74px; y: 200px; } }
      @keyframes lineOne { 0%,32% { opacity: 1; } 33%,100% { opacity: 0; } }
      @keyframes lineTwo { 0%,32% { opacity: 0; } 33%,65% { opacity: 1; } 66%,100% { opacity: 0; } }
      @keyframes lineThree { 0%,65% { opacity: 0; } 66%,100% { opacity: 1; } }
    </style>
  </defs>

  <rect width="980" height="340" rx="28" fill="url(#bg)"/>
  <rect width="980" height="340" rx="28" fill="url(#grid)" opacity="0.75"/>
  <path class="scan" d="M0 0H180L260 340H80L0 0Z" fill="url(#accent)" opacity="0.16"/>

  <circle class="float-a" cx="855" cy="74" r="62" fill="#22c55e" opacity="0.1"/>
  <circle class="float-b" cx="120" cy="265" r="76" fill="#38bdf8" opacity="0.08"/>
  <path class="float-b" d="M765 247C801 214 847 211 888 239C848 270 805 273 765 247Z" fill="#a78bfa" opacity="0.12"/>

  <rect x="54" y="50" width="872" height="240" rx="18" fill="#020617" opacity="0.78" stroke="#334155"/>
  <rect x="54" y="50" width="872" height="42" rx="18" fill="#111827"/>
  <circle cx="82" cy="71" r="6" fill="#ef4444"/>
  <circle cx="104" cy="71" r="6" fill="#f59e0b"/>
  <circle cx="126" cy="71" r="6" fill="#22c55e"/>
  <text x="156" y="77" class="mono" fill="#94a3b8" font-size="14">slmpst / automation-lab</text>

  <text x="82" y="132" class="sans" fill="#f8fafc" font-size="34" font-weight="800">Selim</text>
  <text x="82" y="166" class="mono" fill="#22c55e" font-size="18">$ build --web --desktop --automation</text>
  <rect class="blink" x="474" y="151" width="10" height="21" fill="#22c55e"/>

  <text class="line-one mono" x="82" y="207" fill="#cbd5e1" font-size="17">Running containers, APIs, dashboards and workflow automations...</text>
  <text class="line-two mono" x="82" y="207" fill="#cbd5e1" font-size="17">Shipping practical tools with Docker, React, Node.js and Python...</text>
  <text class="line-three mono" x="82" y="207" fill="#cbd5e1" font-size="17">Turning repetitive work into reliable software systems...</text>

  <g transform="translate(78 238)">
    <rect width="104" height="28" rx="14" fill="#0f172a" stroke="#22c55e" opacity="0.95"/>
    <circle class="pulse" cx="20" cy="14" r="6" fill="#22c55e"/>
    <text x="34" y="19" class="mono" fill="#d1fae5" font-size="13">Docker</text>
  </g>
  <g transform="translate(198 238)">
    <rect width="98" height="28" rx="14" fill="#0f172a" stroke="#38bdf8" opacity="0.95"/>
    <circle class="pulse" cx="20" cy="14" r="6" fill="#38bdf8"/>
    <text x="34" y="19" class="mono" fill="#e0f2fe" font-size="13">React</text>
  </g>
  <g transform="translate(312 238)">
    <rect width="116" height="28" rx="14" fill="#0f172a" stroke="#a78bfa" opacity="0.95"/>
    <circle class="pulse" cx="20" cy="14" r="6" fill="#a78bfa"/>
    <text x="34" y="19" class="mono" fill="#ede9fe" font-size="13">Automation</text>
  </g>

  <g transform="translate(704 104)">
    <rect x="0" y="0" width="150" height="170" rx="16" fill="#0f172a" stroke="#334155"/>
    <text x="22" y="35" class="mono" fill="#94a3b8" font-size="13">activity</text>
    <rect class="bar-a" x="28" y="246" width="18" height="28" rx="7" fill="#22c55e" transform="translate(0 -104)"/>
    <rect class="bar-b" x="62" y="222" width="18" height="52" rx="7" fill="#38bdf8" transform="translate(0 -104)"/>
    <rect class="bar-c" x="96" y="238" width="18" height="36" rx="7" fill="#a78bfa" transform="translate(0 -104)"/>
    <path d="M28 126H118" stroke="#334155" stroke-width="2"/>
    <path d="M28 88H118" stroke="#334155" stroke-width="2" opacity=".6"/>
    <path d="M28 50H118" stroke="#334155" stroke-width="2" opacity=".35"/>
  </g>

  <path d="M550 252C586 222 628 222 664 252" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity=".65" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" values="0 150;95 150;0 150" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dashoffset" values="0;-150" dur="3.2s" repeatCount="indefinite"/>
  </path>
</svg>
